<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CookieVault</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>

  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="header">
      <img src="icons/icon48.png" alt="CookieVault" class="logo">
      <h1>CookieVault</h1>
    </div>
    <div class="form-group">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" placeholder="username" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <div class="password-wrapper">
        <input type="password" id="login-password" placeholder="password" autocomplete="current-password">
        <button type="button" class="password-toggle" id="toggle-password" aria-label="Toggle password">
          <svg id="eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
            <line x1="1" y1="1" x2="23" y2="23" />
          </svg>
          <svg id="eye-on" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </button>
      </div>
    </div>
    <div id="login-error" class="error-msg"></div>
    <button id="btn-login" class="btn btn-full">Login</button>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" class="screen hidden">
    <div class="header">
      <div class="header-left">
        <img src="icons/icon48.png" alt="CookieVault" class="logo">
        <div>
          <h1>CookieVault</h1>
          <span id="current-site" class="site-label">loading...</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="btn-open-dashboard" class="btn-icon" title="Open Dashboard">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h6" />
            <polyline points="15 3 21 3 21 9" />
            <line x1="10" y1="14" x2="21" y2="3" />
          </svg>
        </button>
        <button id="btn-logout" class="btn-icon" title="Logout">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Save Section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Save Current Site</span>
      </div>
      <div class="save-form">
        <div class="form-row">
          <input type="text" id="cookie-name-input" placeholder="Cookie Name" value="">
        </div>
        <button id="btn-save-cookies" class="btn btn-primary btn-full">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Save Cookies to Vault
        </button>
        <div id="save-status" class="status-msg"></div>
      </div>
    </div>

    <!-- Cookie List Section -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">Saved for <span id="section-domain">this site</span></span>
        <button id="btn-refresh" class="btn-icon" title="Refresh">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10" />
            <polyline points="1 20 1 14 7 14" />
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
          </svg>
        </button>
      </div>
      <div class="search-row">
        <input type="text" id="cookie-search" placeholder="Search cookies..." class="search-input">
      </div>
      <div id="cookie-list" class="cookie-list">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
